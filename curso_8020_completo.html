<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#080810">
<title>Curso 8020 · De Cero a Futuros</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inconsolata:wght@400;600&family=Lora:ital,wght@0,400;0,500;1,400&display=swap');

:root {
  --bg: #080810;
  --surface: #0f0f1a;
  --surface2: #16162a;
  --surface3: #1e1e35;
  --border: rgba(255,255,255,0.06);
  --border2: rgba(255,255,255,0.12);
  --text: #eeeef8;
  --muted: rgba(238,238,248,0.4);
  --muted2: rgba(238,238,248,0.65);
  --green: #00ffaa;
  --green-dim: rgba(0,255,170,0.08);
  --green-border: rgba(0,255,170,0.25);
  --red: #ff4d6d;
  --red-dim: rgba(255,77,109,0.08);
  --amber: #ffcc44;
  --amber-dim: rgba(255,204,68,0.08);
  --blue: #60a5fa;
  --blue-dim: rgba(96,165,250,0.08);
  --purple: #c084fc;
  --purple-dim: rgba(192,132,252,0.08);
  --accent: #00ffaa;
  --syne: 'Syne', sans-serif;
  --lora: 'Lora', serif;
  --mono: 'Inconsolata', monospace;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  font-family: var(--lora);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  font-size: 16px;
  line-height: 1.7;
}

/* ── SPLASH SCREEN ── */
.splash {
  position: fixed; inset: 0;
  background: var(--bg);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  z-index: 1000;
  transition: opacity .5s, visibility .5s;
}
.splash.hidden { opacity: 0; visibility: hidden; }
.splash-logo {
  font-family: var(--syne);
  font-size: 64px;
  font-weight: 800;
  color: var(--accent);
  line-height: 1;
  margin-bottom: 8px;
}
.splash-sub {
  font-family: var(--mono);
  font-size: 13px;
  color: var(--muted);
  letter-spacing: .15em;
  text-transform: uppercase;
}
.splash-bar {
  width: 120px; height: 2px;
  background: var(--surface3);
  border-radius: 1px;
  margin-top: 2rem;
  overflow: hidden;
}
.splash-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 1px;
  animation: load 1.2s ease forwards;
}
@keyframes load { from{width:0} to{width:100%} }

/* ── SIDEBAR ── */
.layout { display: flex; min-height: 100vh; }

.sidebar {
  width: 280px;
  min-width: 280px;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  position: fixed;
  top: 0; left: 0; bottom: 0;
  overflow-y: auto;
  z-index: 50;
  transform: translateX(-100%);
  transition: transform .3s cubic-bezier(.4,0,.2,1);
}
.sidebar.open { transform: translateX(0); }

.sidebar-header {
  padding: 1.5rem 1.25rem 1rem;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.sidebar-logo {
  font-family: var(--syne);
  font-size: 22px;
  font-weight: 800;
  color: var(--accent);
}
.sidebar-sub {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--muted);
  letter-spacing: .1em;
  text-transform: uppercase;
  margin-top: 2px;
}

.sidebar-progress {
  padding: 1rem 1.25rem;
  border-bottom: 1px solid var(--border);
}
.prog-label { font-family: var(--mono); font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 6px; }
.prog-bar { height: 4px; background: var(--surface3); border-radius: 2px; overflow: hidden; margin-bottom: 4px; }
.prog-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width .5s; }
.prog-text { font-family: var(--mono); font-size: 11px; color: var(--muted2); }

.module-group { padding: 0.5rem 0; }
.module-label {
  padding: 0.5rem 1.25rem;
  font-family: var(--syne);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: var(--muted);
}
.lesson-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 1.25rem;
  cursor: pointer;
  transition: background .15s;
  border-left: 2px solid transparent;
  font-family: var(--syne);
  font-size: 13px;
  color: var(--muted2);
  line-height: 1.3;
}
.lesson-item:hover { background: var(--surface2); }
.lesson-item.active { background: var(--green-dim); border-left-color: var(--accent); color: var(--text); }
.lesson-item.done { color: var(--muted2); }
.lesson-num {
  font-family: var(--mono);
  font-size: 10px;
  width: 22px; height: 22px;
  min-width: 22px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  border: 1px solid var(--border2);
  color: var(--muted);
  flex-shrink: 0;
}
.lesson-item.active .lesson-num { background: var(--accent); border-color: var(--accent); color: #000; font-weight: 600; }
.lesson-item.done .lesson-num { background: var(--surface3); border-color: var(--border2); color: var(--accent); }

.overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.6);
  z-index: 40;
  display: none;
}
.overlay.show { display: block; }

/* ── MAIN CONTENT ── */
.main {
  flex: 1;
  margin-left: 0;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

.topbar {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 1rem 1.25rem;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  position: sticky;
  top: 0;
  z-index: 30;
}
.menu-btn {
  width: 36px; height: 36px;
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  flex-shrink: 0;
  font-size: 16px;
}
.topbar-title {
  font-family: var(--syne);
  font-size: 14px;
  font-weight: 600;
  color: var(--text);
  flex: 1;
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.topbar-badge {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--muted);
  background: var(--surface3);
  border: 1px solid var(--border2);
  padding: 3px 8px;
  border-radius: 20px;
  flex-shrink: 0;
}

/* ── LESSON CONTENT ── */
.lesson-content {
  flex: 1;
  padding: 1.5rem 1.25rem 6rem;
  max-width: 680px;
  margin: 0 auto;
  width: 100%;
}

.lesson-header { margin-bottom: 2rem; }
.lesson-module-tag {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 8px;
}
.lesson-title {
  font-family: var(--syne);
  font-size: 26px;
  font-weight: 800;
  line-height: 1.2;
  color: var(--text);
  margin-bottom: 10px;
}
.lesson-intro {
  font-size: 15px;
  color: var(--muted2);
  line-height: 1.7;
  font-style: italic;
}

/* Content blocks */
.prose p { margin-bottom: 1rem; color: var(--muted2); font-size: 15px; }
.prose p strong { color: var(--text); font-style: normal; }
.prose h3 {
  font-family: var(--syne);
  font-size: 17px;
  font-weight: 700;
  color: var(--text);
  margin: 1.75rem 0 0.75rem;
}

.callout {
  border-left: 3px solid;
  padding: 12px 16px;
  border-radius: 0 10px 10px 0;
  margin: 1.25rem 0;
  font-size: 14px;
  line-height: 1.6;
}
.callout.green { border-color: var(--green); background: var(--green-dim); color: var(--text); }
.callout.amber { border-color: var(--amber); background: var(--amber-dim); color: var(--text); }
.callout.red { border-color: var(--red); background: var(--red-dim); color: var(--text); }
.callout.blue { border-color: var(--blue); background: var(--blue-dim); color: var(--text); }
.callout.purple { border-color: var(--purple); background: var(--purple-dim); color: var(--text); }
.callout-title { font-family: var(--syne); font-size: 11px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; margin-bottom: 6px; }
.callout.green .callout-title { color: var(--green); }
.callout.amber .callout-title { color: var(--amber); }
.callout.red .callout-title { color: var(--red); }
.callout.blue .callout-title { color: var(--blue); }
.callout.purple .callout-title { color: var(--purple); }

.concept-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 1.25rem 0; }
.concept-card {
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 12px;
  padding: 14px;
}
.concept-card .icon { font-size: 22px; margin-bottom: 6px; }
.concept-card .ctitle { font-family: var(--syne); font-size: 13px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
.concept-card .cdesc { font-size: 12px; color: var(--muted2); line-height: 1.5; font-family: var(--lora); }

.table-wrap { overflow-x: auto; margin: 1.25rem 0; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th {
  font-family: var(--syne);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--muted);
  padding: 8px 10px;
  text-align: left;
  border-bottom: 1px solid var(--border2);
}
td { padding: 10px; border-bottom: 1px solid var(--border); color: var(--muted2); font-size: 13px; vertical-align: top; }
td strong { color: var(--text); }
tr:last-child td { border-bottom: none; }
tr:hover td { background: var(--surface2); }

.mono-block {
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 10px;
  padding: 14px 16px;
  font-family: var(--mono);
  font-size: 13px;
  color: var(--green);
  line-height: 1.8;
  margin: 1.25rem 0;
}
.mono-block .comment { color: var(--muted); }

.step-list { margin: 1.25rem 0; }
.step-item {
  display: flex;
  gap: 14px;
  margin-bottom: 14px;
  align-items: flex-start;
}
.step-dot {
  width: 28px; height: 28px; min-width: 28px;
  border-radius: 50%;
  background: var(--surface2);
  border: 1px solid var(--accent);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 600;
  color: var(--accent);
  margin-top: 2px;
}
.step-body { font-size: 14px; color: var(--muted2); line-height: 1.6; }
.step-body strong { color: var(--text); display: block; font-family: var(--syne); font-size: 14px; margin-bottom: 2px; }

/* Quiz */
.quiz-block {
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 14px;
  padding: 1.25rem;
  margin: 1.5rem 0;
}
.quiz-title {
  font-family: var(--syne);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--amber);
  margin-bottom: 10px;
}
.quiz-q { font-size: 15px; color: var(--text); margin-bottom: 12px; line-height: 1.5; }
.quiz-options { display: flex; flex-direction: column; gap: 6px; }
.quiz-opt {
  padding: 10px 14px;
  border: 1px solid var(--border2);
  border-radius: 8px;
  cursor: pointer;
  font-size: 14px;
  color: var(--muted2);
  transition: all .2s;
  background: var(--surface);
  font-family: var(--lora);
}
.quiz-opt:hover { border-color: var(--border2); background: var(--surface3); }
.quiz-opt.correct { border-color: var(--green); background: var(--green-dim); color: var(--green); }
.quiz-opt.wrong { border-color: var(--red); background: var(--red-dim); color: var(--red); }
.quiz-opt.disabled { cursor: default; }
.quiz-feedback { margin-top: 10px; font-size: 13px; padding: 8px 12px; border-radius: 8px; display: none; }
.quiz-feedback.show { display: block; }
.quiz-feedback.ok { background: var(--green-dim); color: var(--green); }
.quiz-feedback.fail { background: var(--red-dim); color: var(--red); }

/* Pattern visual */
.pattern-viz {
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 14px;
  padding: 1.25rem;
  margin: 1.25rem 0;
  text-align: center;
}
.pattern-viz svg { max-width: 100%; }
.pattern-viz .viz-label {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--muted);
  margin-top: 8px;
  letter-spacing: .06em;
}

/* Bottom nav */
.bottom-nav {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: var(--surface);
  border-top: 1px solid var(--border);
  padding: 0.875rem 1.25rem;
  display: flex;
  gap: 10px;
  z-index: 30;
}
.nav-btn {
  flex: 1;
  padding: 11px;
  border-radius: 10px;
  font-family: var(--syne);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  text-align: center;
  transition: all .2s;
  border: 1px solid;
}
.nav-btn.prev { background: transparent; border-color: var(--border2); color: var(--muted2); }
.nav-btn.prev:hover { background: var(--surface2); }
.nav-btn.next { background: var(--green-dim); border-color: var(--green-border); color: var(--green); }
.nav-btn.next:hover { background: rgba(0,255,170,0.15); }
.nav-btn.done-btn { background: var(--green); border-color: var(--green); color: #000; }

.lesson-done-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: var(--green-dim);
  border: 1px solid var(--green-border);
  color: var(--green);
  font-family: var(--mono);
  font-size: 11px;
  padding: 4px 10px;
  border-radius: 20px;
  margin-bottom: 1rem;
}

.divider { height: 1px; background: var(--border); margin: 1.5rem 0; }
.spacer { height: 1rem; }

/* Highlight box */
.highlight {
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 12px;
  padding: 1rem 1.25rem;
  margin: 1.25rem 0;
}
.highlight .hl-num {
  font-family: var(--mono);
  font-size: 32px;
  font-weight: 600;
  color: var(--accent);
  line-height: 1;
}
.highlight .hl-label { font-size: 12px; color: var(--muted); margin-top: 2px; }

.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 1rem 0; }
.info-card {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px;
}
.info-card .ic-label { font-family: var(--mono); font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 4px; }
.info-card .ic-val { font-family: var(--syne); font-size: 15px; font-weight: 700; color: var(--text); }
.info-card .ic-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }

/* Responsive: desktop sidebar always open */
@media (min-width: 900px) {
  .sidebar { transform: translateX(0) !important; position: fixed; }
  .main { margin-left: 280px; }
  .overlay { display: none !important; }
  .menu-btn { display: none; }
}
</style>
</head>
<body>

<!-- Splash -->
<div class="splash" id="splash">
  <div class="splash-logo">8020</div>
  <div class="splash-sub">Curso · De Cero a Futuros</div>
  <div class="splash-bar"><div class="splash-fill"></div></div>
</div>

<div class="overlay" id="overlay" onclick="closeSidebar()"></div>

<!-- Sidebar -->
<div class="layout">
<aside class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <div class="sidebar-logo">8020</div>
    <div class="sidebar-sub">De cero a futuros · Okala</div>
  </div>
  <div class="sidebar-progress">
    <div class="prog-label">Tu progreso</div>
    <div class="prog-bar"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
    <div class="prog-text" id="prog-text">0 de 14 lecciones</div>
  </div>
  <div id="sidebar-nav"></div>
</aside>

<!-- Main -->
<main class="main">
  <div class="topbar">
    <div class="menu-btn" onclick="toggleSidebar()">☰</div>
    <div class="topbar-title" id="topbar-title">Módulo 1 · Fundamentos</div>
    <div class="topbar-badge" id="topbar-badge">L1</div>
  </div>

  <div class="lesson-content" id="lesson-content"></div>

  <div class="bottom-nav">
    <button class="nav-btn prev" onclick="prevLesson()">← Anterior</button>
    <button class="nav-btn next" id="next-btn" onclick="nextLesson()">Siguiente →</button>
  </div>
</main>
</div>

<script>
// ── DATA ──
const modules = [
  {

    lessons: [
      {
        id: 1,
        title: 'El NQ y el MNQ — Tu nuevo campo de juego',
        tag: 'Módulo 1 · Fundamentos',
        intro: 'Antes de operar cualquier cosa, necesitas entender exactamente qué estás comprando y vendiendo. El NASDAQ Futures no es una acción ni un CFD — es algo diferente y más poderoso.',
        content: `
<div class="prose">
<p>El <strong>NQ</strong> es el contrato de futuros del NASDAQ-100 que se negocia en el CME (Chicago Mercantile Exchange). Cuando ves el NASDAQ en las noticias — ese número de 20,000, 21,000 puntos — eso es exactamente lo que el NQ representa.</p>

<h3>¿Cómo se mueve el NQ?</h3>
<p>El NQ cotiza en <strong>cuartos de punto</strong> (0.25). Esto es fundamental para entender la estrategia 8020, porque los niveles 80 y 20 son precisamente dos de esos cuartos dentro de cada número entero.</p>
</div>

<div class="mono-block">
<span class="comment"># Ejemplo de cotización NQ:</span>
21,080.00  →  nivel 80
21,060.00  →  nivel 60 (intermedio)
21,020.00  →  nivel 20
21,000.00  →  nivel 00
</div>

<div class="prose">
<h3>El valor del dinero real</h3>
<p>Aquí está lo que necesitas grabar en tu cabeza:</p>
</div>

<div class="concept-grid">
  <div class="concept-card">

  </div>
  <div class="concept-card">

  </div>
</div>

<div class="callout amber">
  <div class="callout-title">⚡ Por qué empezar con el MNQ</div>
  El MNQ es idéntico al NQ en todo — mismos niveles, misma estructura, misma estrategia 8020. La única diferencia es que cada punto vale $2 en lugar de $20. Perfecto para aprender sin que los errores duelan.
</div>

<div class="prose">
<h3>¿Por qué futuros y no CFD?</h3>
<p>La diferencia no es filosófica — es matemática y estructural:</p>
</div>

<div class="table-wrap">

<div class="callout green">
  <div class="callout-title">✓ La conclusión clave</div>

</div>

<div class="quiz-block">

  <div class="quiz-q">Si tienes 3 contratos de MNQ y el precio se mueve 10 puntos a tu favor, ¿cuánto ganas?</div>
  <div class="quiz-options">
    <div class="quiz-opt" onclick="answer(this, false)">$200</div>
    <div class="quiz-opt" onclick="answer(this, true)">$60</div>
    <div class="quiz-opt" onclick="answer(this, false)">$600</div>
    <div class="quiz-opt" onclick="answer(this, false)">$20</div>
  </div>
  <div class="quiz-feedback" id="qfeed">3 contratos × 10 puntos × $2 por punto = $60. ¡Correcto!</div>
</div>
`
      },

// ── STATE ──
let currentLesson = 0;
const totalLessons = modules.reduce((s,m) => s + m.lessons.length, 0);
let allLessons = [];
modules.forEach(m => m.lessons.forEach(l => allLessons.push(l)));
let done = JSON.parse(localStorage.getItem('done_8020') || '[]');

// ── INIT ──
window.addEventListener('load', () => {
  setTimeout(() => {
    document.getElementById('splash').classList.add('hidden');
    buildSidebar();
    renderLesson(0);
  }, 1400);
});

function buildSidebar() {
  const nav = document.getElementById('sidebar-nav');
  let idx = 0;
  nav.innerHTML = modules.map((mod, mi) => `
    <div class="module-group">
      <div class="module-label">${mod.title}</div>
      ${mod.lessons.map(l => {
        const i = idx++;
        const isDone = done.includes(l.id);
        return `<div class="lesson-item ${isDone ? 'done' : ''}" id="li-${i}" onclick="goTo(${i});closeSidebar()">
          <div class="lesson-num">${isDone ? '✓' : l.id}</div>
          ${l.title}
        </div>`;
      }).join('')}
    </div>
  `).join('');
  updateProgress();
}

function updateProgress() {
  const pct = Math.round((done.length / totalLessons) * 100);
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('prog-text').textContent = `${done.length} de ${totalLessons} lecciones`;
}

function renderLesson(idx) {
  currentLesson = idx;
  const l = allLessons[idx];
  document.getElementById('topbar-title').textContent = l.title;
  document.getElementById('topbar-badge').textContent = 'L' + l.id;

  const isDone = done.includes(l.id);
  document.getElementById('lesson-content').innerHTML = `
    <div class="lesson-header">
      <div class="lesson-module-tag">${l.tag}</div>
      ${isDone ? '<div class="lesson-done-badge">✓ Completada</div>' : ''}
      <div class="lesson-title">${l.title}</div>
      <div class="lesson-intro">${l.intro}</div>
    </div>
    ${l.content}
    <div style="height:2rem"></div>
  `;

  // Update sidebar active
  document.querySelectorAll('.lesson-item').forEach((el, i) => {
    el.classList.toggle('active', i === idx);
  });

  // Update nav buttons
  const nextBtn = document.getElementById('next-btn');
  if (idx === totalLessons - 1) {
    nextBtn.textContent = '¡Curso completado! 🎉';
    nextBtn.className = 'nav-btn done-btn';
  } else {
    nextBtn.textContent = 'Siguiente →';
    nextBtn.className = 'nav-btn next';
  }

  window.scrollTo(0, 0);
  markDone(l.id);
}

function markDone(id) {
  if (!done.includes(id)) {
    done.push(id);
    localStorage.setItem('done_8020', JSON.stringify(done));
    buildSidebar();
  }
}

function goTo(idx) { renderLesson(idx); }

function nextLesson() {
  if (currentLesson < totalLessons - 1) renderLesson(currentLesson + 1);
}
function prevLesson() {
  if (currentLesson > 0) renderLesson(currentLesson - 1);
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('show');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('show');
}

// Quiz
function answer(el, correct) {
  if (el.classList.contains('disabled')) return;
  const opts = el.parentElement.querySelectorAll('.quiz-opt');
  opts.forEach(o => o.classList.add('disabled'));
  el.classList.add(correct ? 'correct' : 'wrong');
  const fb = el.closest('.quiz-block').querySelector('.quiz-feedback');
  fb.classList.add('show', correct ? 'ok' : 'fail');
  if (!correct) fb.textContent = '❌ ' + fb.textContent;
  else fb.textContent = '✓ ' + fb.textContent;
}
